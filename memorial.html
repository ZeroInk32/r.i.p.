<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>云端追思</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #1e2a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', '华文楷书', 'Microsoft YaHei', 'Georgia', 'Times New Roman', serif;
            padding: 20px;
        }

        .memorial-container {
            max-width: 800px;
            width: 100%;
            background: #ece4d7;
            background-image: radial-gradient(circle at 10% 20%, rgba(210, 180, 140, 0.15) 2%, transparent 2.5%),
                radial-gradient(circle at 85% 70%, rgba(160, 120, 80, 0.1) 1.8%, transparent 2%);
            background-size: 48px 48px, 60px 60px;
            border-radius: 64px 64px 48px 48px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4), inset 0 1px 4px rgba(255, 255, 200, 0.6);
            overflow: hidden;
        }

        .paper-bg {
            background: rgba(250, 245, 235, 0.75);
            backdrop-filter: blur(1px);
            padding: 1.8rem 1.5rem 2.2rem;
        }

        .tomb-header {
            text-align: center;
            border-bottom: 2px solid #b87c4f;
            margin-bottom: 1.8rem;
            padding-bottom: 0.8rem;
        }

        .tomb-header h1 {
            font-size: 2.6rem;
            letter-spacing: 6px;
            color: #3e2a21;
            font-weight: 500;
            text-shadow: 2px 2px 0 #d9c5a7;
            font-family: '华文楷书', 'KaiTi', serif;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #6b4c3b;
            margin-top: 8px;
            font-style: italic;
            border-top: 1px dashed #cbad85;
            display: inline-block;
            padding-top: 6px;
        }

        .memorial-statue {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0 10px;
        }

        .teacher-portrait {
            width: 150px;
            object-fit: contain;
            border-radius: 28px;
            border: 3px solid #e2c7a5;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            background-color: #fef3e0;
            margin-bottom: 12px;
        }

        .teacher-name {
            font-size: 1.9rem;
            font-weight: bold;
            color: #4e2e22;
            background: #fef3e0;
            padding: 4px 24px;
            border-radius: 60px;
            letter-spacing: 4px;
            font-family: '华文楷书', 'KaiTi', serif;
            border: 1px solid #e2c7a5;
        }

        .lifespan {
            font-size: 1rem;
            color: #7c5a42;
            margin-top: 12px;
            background: rgba(230, 210, 180, 0.5);
            padding: 5px 14px;
            border-radius: 30px;
        }

        .eulogy {
            background: #fff9ef;
            padding: 20px 24px;
            border-radius: 48px;
            margin: 28px 0;
            border: 1px solid #eedbba;
        }

        .eulogy p {
            font-size: 1rem;
            line-height: 1.75;
            color: #2f241b;
            text-indent: 2em;
            margin: 0.6rem 0;
        }

        .eulogy .quote {
            font-style: italic;
            text-align: center;
            color: #a57048;
            border-left: 4px solid #dbbb95;
            padding-left: 18px;
            margin: 12px 0;
        }

        .offering-area {
            background: #e7d9ca;
            border-radius: 60px;
            padding: 18px;
            margin-bottom: 30px;
            text-align: center;
        }

        .offering-title {
            font-size: 1.25rem;
            color: #5a3a28;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .offering-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .ritual-btn {
            background: #fff2e2;
            border: none;
            padding: 10px 28px;
            border-radius: 48px;
            font-size: 1.15rem;
            font-family: inherit;
            font-weight: 500;
            color: #5b3a28;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #cfa97c;
        }

        .ritual-btn:hover {
            transform: translateY(-2px);
            background: #fffaef;
        }

        .sender-section {
            background: #faf0e2;
            border-radius: 48px;
            padding: 14px 20px;
            margin: 12px 0;
            border: 1px solid #e2caad;
        }

        .sender-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .sender-input {
            flex: 2;
            min-width: 180px;
            background: #fffaf2;
            border: 1px solid #e2caad;
            border-radius: 48px;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }

        .gift-item-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .gift-item-row input {
            flex: 2;
            min-width: 180px;
            background: #fffaf2;
            border: 1px solid #e2caad;
            border-radius: 48px;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }

        .send-gift-btn {
            background: #b28b65;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .unified-log {
            background: #faf0e2;
            border-radius: 36px;
            padding: 12px 18px;
            margin-top: 16px;
            max-height: 180px;
            overflow-y: auto;
            font-size: 0.85rem;
            text-align: left;
            border: 1px solid #eddbbc;
        }

        .unified-log p {
            margin: 8px 0;
            border-left: 2px solid #cbaa7a;
            padding-left: 12px;
            color: #593e2c;
        }

        .log-time {
            font-size: 0.7rem;
            color: #9e7b5c;
            margin-right: 10px;
        }

        .candle-area {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .candle {
            width: 38px;
            height: 70px;
            background: #fff3cf;
            border-radius: 20px 20px 8px 8px;
            position: relative;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }

        .flame {
            width: 14px;
            height: 28px;
            background: #ffa047;
            border-radius: 50% 50% 30% 30%;
            position: absolute;
            top: -18px;
            left: 12px;
            animation: flicker 0.8s infinite alternate;
        }

        @keyframes flicker {
            0% {
                transform: scaleY(1);
                background: #ff8c3a;
            }

            100% {
                transform: scaleY(1.2);
                background: #ffb347;
            }
        }

        .message-section {
            background: #fffaf0;
            border-radius: 48px;
            padding: 20px;
            margin: 25px 0 20px;
        }

        .message-title {
            font-size: 1.3rem;
            color: #4e3624;
            border-left: 5px solid #c59464;
            padding-left: 16px;
            margin-bottom: 18px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .input-group input,
        .input-group textarea {
            border: 1px solid #e6cfb5;
            background: #ffffffdb;
            border-radius: 32px;
            padding: 12px 18px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }

        .send-msg {
            background: #b28b65;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: fit-content;
            align-self: flex-end;
        }

        .message-list {
            max-height: 240px;
            overflow-y: auto;
            margin-top: 18px;
            border-top: 1px solid #eedbc8;
            padding-top: 12px;
        }

        .single-message {
            background: #fef5ea;
            margin: 10px 0;
            padding: 12px 16px;
            border-radius: 28px;
            border: 1px solid #f0ddc6;
        }

        .msg-name {
            font-weight: bold;
            color: #8b5a2e;
        }

        .msg-text {
            color: #3b2a1f;
            margin: 6px 0;
        }

        .msg-date {
            font-size: 0.65rem;
            color: #b28a62;
            text-align: right;
        }

        .flower-petal {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            font-size: 1.5rem;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(100vh) rotate(300deg);
                opacity: 0;
            }
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #9b7a5c;
            padding-top: 20px;
            border-top: 1px solid #dfcaaf;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #9b7a5c;
        }
    </style>
</head>

<body>
    <div class="memorial-container">
        <div class="paper-bg">
            <div class="tomb-header">
                <h1>🌿 刘银老师 🌿</h1>
                <div class="subtitle">临川一中 · 春风化雨 桃李思源</div>
            </div>

            <div class="memorial-statue">
                <img class="teacher-portrait"
                 src="https://m.ccw.site/post/692538ef86bbc77f84e3b259/fe05885a-1352-45be-b02a-3ed59bcb4622.jpg"
                 alt="刘银老师肖像">
                <div class="teacher-name">刘 银 老 师</div>
                <div class="lifespan">临川一中 · 语文组 · 师恩永铭</div>
            </div>

            <div class="eulogy">
                <p>刘银老师，临川一中语文名师，从教数十载，温润如玉，诲人不倦。讲台上，您以诗书传道，用墨香滋养少年心灵；课堂外，您如慈父挚友，关切每一位学子的成长。</p>
                <div class="quote">“杏坛流芳，师恩似海。临川才乡，幸得先生引路。”</div>
                <p>清明虽过，思念不息。今立云端追思园，愿您桃李芬芳的教诲长存心间。献一束花，点一盏烛，留一段话，寄无尽感恩。</p>
            </div>

            <div class="offering-area">
                <div class="offering-title">
                    <span>🕯️</span> 遥寄追思 · 心意相通 <span>🌸</span>
                </div>

                <div class="sender-section">
                    <div class="sender-row">
                        <label>🙏 追思者：</label>
                        <input type="text" id="unifiedSenderName" class="sender-input" placeholder="您的姓名 / 届别" value="临川学子">
                    </div>
                    <div class="gift-item-row">
                        <input type="text" id="giftItemName" placeholder="礼物名称 (如：诗集、清茶)" value="心香一瓣">
                        <button class="send-gift-btn" id="sendGiftBtn">🎁 敬赠心意</button>
                    </div>
                </div>

                <div class="offering-buttons">
                    <button class="ritual-btn" id="flowerBtn">🌸 献花敬师</button>
                    <button class="ritual-btn" id="candleBtn">🕯️ 点亮心烛</button>
                </div>

                <div class="candle-area" id="candleDisplay"></div>

                <div class="unified-log" id="unifiedLog">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div class="message-section">
                <div class="message-title">💬 寄思留言板</div>
                <div class="input-group">
                    <input type="text" id="guestName" placeholder="您的姓名" value="临川学子">
                    <textarea id="guestMsg" rows="2" placeholder="写下想对刘银老师说的话..."></textarea>
                    <button class="send-msg" id="sendMsgBtn">✍️ 寄出思念</button>
                </div>
                <div class="message-list" id="messageList">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <footer>
                🌿 临川一中 · 云端追思园 · 师恩长存 🌿
            </footer>
        </div>
    </div>

    <script>
        // ================= Supabase 配置 =================
    const SUPABASE_URL = 'https://yrtkocalrqslwvaozfzf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_jDZ6SWz7XUIgNuPE6YEKng_6H0p9D8G';

    // API 基础地址
    const API_URL = `${SUPABASE_URL}/rest/v1`;

    // 通用 fetch 配置
    const fetchConfig = (method, body = null) => ({
        method,
        headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: body ? JSON.stringify(body) : null
    });

    // ================= 留言相关 API =================
    async function loadComments() {
        try {
            const response = await fetch(
                `${API_URL}/comments?select=*&order=created_at.desc`,
                fetchConfig('GET')
            );
            if (!response.ok) throw new Error('加载留言失败');
            const comments = await response.json();
            renderComments(comments);
        } catch (error) {
            console.error('加载留言出错:', error);
            document.getElementById('messageList').innerHTML = '<div class="empty-msg">加载失败，请刷新重试</div>';
        }
    }

    async function addComment(name, content) {
        try {
            const response = await fetch(
                `${API_URL}/comments`,
                fetchConfig('POST', { name, content })
            );
            if (!response.ok) throw new Error('发送留言失败');
            await loadComments(); // 重新加载
            return true;
        } catch (error) {
            console.error('发送留言出错:', error);
            alert('发送失败，请稍后重试');
            return false;
        }
    }

    function renderComments(comments) {
        const container = document.getElementById('messageList');
        if (!comments || comments.length === 0) {
            container.innerHTML = '<div class="empty-msg">✨ 暂无留言，请写下您的追思 ✨</div>';
            return;
        }
        container.innerHTML = comments.map(comment => `
            <div class="single-message">
                <div><span class="msg-name">📖 ${escapeHtml(comment.name)}</span> <span style="font-size:0.7rem;">· 致刘银老师</span></div>
                <div class="msg-text">${escapeHtml(comment.content)}</div>
                <div class="msg-date">${formatDate(comment.created_at)}</div>
            </div>
        `).join('');
    }

    // ================= 追思记录 API (献花/点烛/赠礼) =================
    async function loadGifts() {
        try {
            const response = await fetch(
                `${API_URL}/gifts?select=*&order=created_at.desc&limit=50`,
                fetchConfig('GET')
            );
            if (!response.ok) throw new Error('加载追思记录失败');
            const gifts = await response.json();
            renderGifts(gifts);
        } catch (error) {
            console.error('加载追思记录出错:', error);
            document.getElementById('unifiedLog').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
        }
    }

    async function addGiftRecord(sender, actionType, giftName = null) {
        try {
            const body = { sender, action_type: actionType };
            if (giftName) body.gift_name = giftName;
            
            const response = await fetch(
                `${API_URL}/gifts`,
                fetchConfig('POST', body)
            );
            if (!response.ok) throw new Error('记录失败');
            await loadGifts(); // 重新加载
            return true;
        } catch (error) {
            console.error('记录出错:', error);
            alert('操作失败，请稍后重试');
            return false;
        }
    }

    function renderGifts(gifts) {
        const container = document.getElementById('unifiedLog');
        if (!gifts || gifts.length === 0) {
            container.innerHTML = '<p><span class="log-time">🍃 静默</span> 待您留下追思印记</p>';
            return;
        }
        let html = '';
        gifts.forEach(gift => {
            let line = '';
            if (gift.action_type === 'flower') {
                line = `🌸 献花 · ${escapeHtml(gift.sender)} 敬献鲜花`;
            } else if (gift.action_type === 'candle') {
                line = `🕯️ 点烛 · ${escapeHtml(gift.sender)} 点亮心烛`;
            } else if (gift.action_type === 'gift') {
                line = `🎁 赠礼 · ${escapeHtml(gift.sender)} 敬赠「${escapeHtml(gift.gift_name || '心意')}」`;
            } else {
                line = `✨ ${escapeHtml(gift.sender)} 寄托思念`;
            }
            html += `<p><span class="log-time">${formatDate(gift.created_at)}</span> ${line}</p>`;
        });
        container.innerHTML = html;
    }

    // ================= 辅助函数 =================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function formatDate(dateStr) {
        if (!dateStr) return '刚刚';
        const date = new Date(dateStr);
        return `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()}
        ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
    }

    function createFloatingPetals(count) {
        for (let i = 0; i < count; i++) {
            const petal = document.createElement('div');
            petal.className = 'flower-petal';
            const types = ['🌸', '🌼', '🌺', '🍂', '🍃', '🌸', '🌿'];
            petal.innerHTML = types[Math.floor(Math.random() * types.length)];
            petal.style.left = Math.random() * 100 + '%';
            petal.style.fontSize = (1 + Math.random() * 1.3) + 'rem';
            petal.style.opacity = 0.7 + Math.random() * 0.3;
            const duration = 3 + Math.random() * 5;
            petal.style.animation = `fall ${duration}s linear forwards`;
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), duration * 1000);
        }
    }

    function createFloatingSparkles(count) {
        for (let i = 0; i < count; i++) {
            const spark = document.createElement('div');
            spark.className = 'flower-petal';
            spark.innerHTML = '✨';
            spark.style.left = Math.random() * 100 + '%';
            spark.style.fontSize = '1.1rem';
            spark.style.opacity = 0.9;
            spark.style.animation = `fall ${2 + Math.random() * 3}s linear forwards`;
            document.body.appendChild(spark);
            setTimeout(() => spark.remove(), 3000);
        }
    }

    // 蜡烛视觉效果（纯前端，与数据库无关）
    let activeCandles = 0;
    function updateCandleVisuals() {
        const candleContainer = document.getElementById('candleDisplay');
        if (!candleContainer) return;
        if (activeCandles >= 6) {
            const tip = document.createElement('div');
            tip.innerText = '烛光满堂，思念深厚。';
            tip.style.fontSize = '0.7rem';
            tip.style.color = '#b87c4f';
            tip.style.padding = '4px';
            candleContainer.appendChild(tip);
            setTimeout(() => tip.remove(), 1200);
            return;
        }
        activeCandles++;
        const candleDiv = document.createElement('div');
        candleDiv.className = 'candle';
        const flame = document.createElement('div');
        flame.className = 'flame';
        candleDiv.appendChild(flame);
        candleContainer.appendChild(candleDiv);
        while (candleContainer.children.length > 6) {
            candleContainer.removeChild(candleContainer.firstChild);
            activeCandles--;
        }
    }

    function initDefaultCandles() {
        const candleContainer = document.getElementById('candleDisplay');
        if (candleContainer && candleContainer.children.length === 0) {
            for (let i = 0; i < 2; i++) {
                const candleDiv = document.createElement('div');
                candleDiv.className = 'candle';
                const flame = document.createElement('div');
                flame.className = 'flame';
                candleDiv.appendChild(flame);
                candleContainer.appendChild(candleDiv);
                activeCandles++;
            }
        }
    }

    // ================= 事件绑定 =================
    document.addEventListener('DOMContentLoaded', () => {
        // 加载数据
        loadComments();
        loadGifts();
        initDefaultCandles();

        const senderInput = document.getElementById('unifiedSenderName');
        const giftItemInput = document.getElementById('giftItemName');

        // 献花
        document.getElementById('flowerBtn').addEventListener('click', async () => {
            let sender = senderInput?.value.trim() || '敬仰者';
            if (sender === '') sender = '敬仰者';
            const success = await addGiftRecord(sender, 'flower');
            if (success) {
                createFloatingPetals(18);
                const msg = document.createElement('div');
                msg.innerText = `🌸 ${sender} 献上一束鲜花`;
                msg.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#f2e3d2;padding:6px 20px;border-radius:40px;z-index:1000';
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2000);
            }
        });

        // 点烛
        document.getElementById('candleBtn').addEventListener('click', async () => {
            let sender = senderInput?.value.trim() || '敬仰者';
            if (sender === '') sender = '敬仰者';
            const success = await addGiftRecord(sender, 'candle');
            if (success) {
                createFloatingSparkles(16);
                updateCandleVisuals();
                const msg = document.createElement('div');
                msg.innerText = `🕯️ ${sender} 点亮追思烛光`;
                msg.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#f2e3d2;padding:6px 20px;border-radius:40px;z-index:1000';
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2000);
            }
        });

        // 赠礼
        document.getElementById('sendGiftBtn').addEventListener('click', async () => {
            let sender = senderInput?.value.trim() || '敬仰者';
            if (sender === '') sender = '敬仰者';
            let giftVal = giftItemInput?.value.trim() || '心意';
            if (giftVal === '') giftVal = '心意';
            const success = await addGiftRecord(sender, 'gift', giftVal);
            if (success) {
                createFloatingPetals(10);
                const msg = document.createElement('div');
                msg.innerText = `🎁 ${sender} 敬赠「${giftVal}」`;
                msg.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#f2e3d2;padding:6px 20px;border-radius:40px;z-index:1000';
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2000);
            }
        });

        // 留言
        document.getElementById('sendMsgBtn').addEventListener('click', async () => {
            const name = document.getElementById('guestName')?.value.trim() || '临川学子';
            const content = document.getElementById('guestMsg')?.value.trim();
            if (!content) {
                alert('请写下寄语内容');
                return;
            }
            const success = await addComment(name, content);
            if (success) {
                document.getElementById('guestMsg').value = '';
                createFloatingPetals(8);
            }
        });
    });
    </script>
</body>

</html>
